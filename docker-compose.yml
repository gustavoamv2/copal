version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: copal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: copal
      POSTGRES_USER: copal
      POSTGRES_PASSWORD: copal_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copal"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: copal_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://copal:copal_secret@postgres:5432/copal
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
